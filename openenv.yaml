name: tabular-analyst-openenv
description: Multi-step data analyst environment over messy real-world style tables.
version: "1.0"

environment:
  module: env.environment
  class: DataEnv
  methods:
    - reset
    - step
    - state

models:
  action_model: env.actions.Action
  observation_model: env.observations.Observation

tasks:
  source: env.tasks.ALL_TASKS
  levels:
    - easy
    - medium
    - hard
  count_min: 3

reward:
  primary: env.reward.shaped_reward
  notes:
    - partial trajectory credit (select/filter/final)
    - invalid action penalty -0.3
    - useless action penalty -0.1
    - confidence-calibrated final-step penalty/boost

grader:
  module: grader.grader
  function: grade
  score_range: [0.0, 1.0]

baseline:
  inference_script: inference.py
  run_script: scripts/run_baseline.py
  eval_script: scripts/eval_baseline.py
  reproducibility:
    seed_env_var: BASELINE_SEED
    default_seed: 42
    temperature: 0.0

# Inference env (official sample): HF_TOKEN required; base URL + model have code defaults.
submission:
  required_env:
    - HF_TOKEN
  optional_defaults:
    API_BASE_URL: https://router.huggingface.co/v1
    MODEL_NAME: Qwen/Qwen2.5-72B-Instruct
  notes:
    - "API_KEY is accepted as an alias for HF_TOKEN"
  precheck_script: scripts/pre_submit_check.py
